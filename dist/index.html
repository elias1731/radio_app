<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <base href="/" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />

  <title>🗿 WILLKOMMEN</title>

  <meta name="description" content="Fordy Radio PWA" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/assets/app.png">

  <link rel="icon" type="image/png" href="/assets/app.png">
  <link rel="manifest" href="/manifest.json" />

  <script src="/assets/pwa.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" crossorigin href="/code/index-D9jVGkWk.css">
</head>

<body id="app-body">
	<div id="dynamic-bg"></div>

	<header>
		<div class="header-brand">
			<i class="fa-solid fa-radio" style="margin-right: 12px; color: var(--accent);"></i>
			<span class="rainbow-text">» 𝓱𝓮𝔂𝓕𝓸𝓻𝓭𝔂.dev 𝗥𝗮𝗱𝗶ο</span>
		</div>
		<button id="bt-toggle-btn" class="round-btn" onclick="toggleBluetooth()">
			<i class="fa-brands fa-bluetooth-b"></i>
		</button>
	</header>

	<div class="layout-wrapper">
		<main>
			<div class="player-container">
				<div class="cover-art-wrapper">
					<div class="cover-inner">
						<img id="player-img" src="/assets/app.png" alt="Station Logo">
						<img id="player-overlay-logo" class="station-logo-overlay" src="" alt="Station Overlay">
					</div>
				</div>

				<div id="player-station-name" style="font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: none;"></div>
				<div id="player-title">𝓕𝓸𝓻𝓭𝔂•𝗥𝗮𝗱𝗶𝗼</div>
				<div id="player-artist"></div>

				<div id="player-status">◽️ BEREIT</div>

				<audio id="audio-el" preload="none" msAudioCategory="BackgroundCapableMedia"></audio>

				<div class="controls">
					<button onclick="toggleMute()" class="round-btn secondary-ctrl"><i id="mute-icon" class="fa-solid fa-volume-high"></i></button>
					<button onclick="togglePlay()" class="play-btn">
						<i id="play-icon" class="fa-solid fa-play"></i>
					</button>
					<button onclick="skipNext()" class="round-btn secondary-ctrl"><i class="fa-solid fa-forward-step"></i></button>
				</div>
			</div>
		</main>

		<aside id="sidebar-stations">
			<div class="sidebar-header">
				<span>SENDERLISTE</span>
				<i class="fa-solid fa-list-ul" style="opacity: 0.5;"></i>
			</div>
			<div class="sidebar-content" id="sidebar-list"></div>
			<div class="sidebar-footer">
				<button onclick="openManager()" class="manage-btn">🧰 Sender verwalten</button>
			</div>
		</aside>
	</div>

	<footer id="main-footer">
		<div class="footer-header" onclick="toggleFooter()">
			<span>SENDERLISTE</span>
			<span id="footer-arrow">▲</span>
		</div>
		<div class="footer-content" id="footer-list-container">
			<div class="footer-content" id="footer-list"></div>
			<div class="footer-link-wrapper">
				<button onclick="openManager()" class="manage-btn">🧰 Sender verwalten</button>
			</div>
		</div>
	</footer>

	<div id="manager-modal" class="modal">
		<div class="modal-content">
			<button class="modal-close-btn-x" onclick="closeManager()"><i class="fa-solid fa-xmark"></i></button>
			<h3 class="modal-title">Sender verwalten</h3>
			<div id="settings-list" style="margin-bottom: 25px;"></div>

			<div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px;">
				<h4 style="margin-bottom: 15px;">Sender manuell hinzufügen</h4>
				<div class="tab-content active" style="display:block;">
					<input type="text" id="new-name" placeholder="Name">
					<input type="text" id="new-url" placeholder="Stream URL">
					<input type="text" id="new-logo" placeholder="Logo URL (optional)">
					<button onclick="addStationManual()" class="modal-btn save">Speichern</button>
				</div>
			</div>
			<button onclick="clearCache()" class="manage-btn" style="color: #ff4444; border-color: rgba(255,0,0,0.2); margin-top: 20px;">
				<i class="fa-solid fa-trash-can" style="margin-right: 8px;"></i> Cache leeren & Reload
			</button>
		</div>
	</div>

	<canvas id="color-canvas" style="display:none;"></canvas>

	<script>
		const defaultStations = [
			{ isDefault: true, name: "Sunshine LIVE", displayName: "SUNSHINE LiVE", apiId: "sunshine-live", url: "https://sunsl.streamabc.net/sunsl-sslsimulcast-mp3-192-4434053", logo: "/assets/sunshine.png" },
			{ isDefault: true, name: "Sunshine LIVE • 90s", displayName: "SUNSHINE 90s", apiId: "sunshine-90s", url: "https://sunsl.streamabc.net/sunsl-90er-mp3-192-9697679", logo: "/assets/sunshine-90s.png" },
			{ isDefault: true, name: "RADiO BOB! (National)", displayName: "RADiO BOB!", apiId: "radio-bob", url: "https://streams.radiobob.de/bob-national/mp3-320/mediaplayer", logo: "/assets/radio-bob.png" },
			{ isDefault: true, name: "Rockland Radio Trier", displayName: "Rockland", apiId: "rockland", url: "https://streams.rockland.de/trier/mp3-192/direkt/", logo: "/assets/rockland.png" },
			{ isDefault: true, name: "Eldoradio Lëtzebuerg", displayName: "E L D O", apiId: "eldoradio", url: "https://sc.bce.lu/eldo", logo: "/assets/eldo.lu.png" },
			{ isDefault: true, name: "FFH SOUNDTRACK", displayName: "FFH SOUNDTRACK", apiId: "ffh-soundtrack", url: "https://mp3.ffh.de/ffhchannels/hqsoundtrack.aac", logo: "/assets/ffh-soundtrack.png" },
			{ isDefault: true, name: "RTL Lëtzebuerg", displayName: "RTL.lu", apiId: "rtl-lux", url: "https://sc.bce.lu/rtl", logo: "/assets/rtl.lu.png" },
			{ isDefault: true, name: "RADIO ENERGY", displayName: "RADIO NRJ", apiId: "nrj", url: "https://edge24.streamonkey.net/energy-digital?aggregator=energy-digital", logo: "/assets/nrj.png" },
			{ isDefault: true, name: "Sunshine Eurodance", displayName: "SUNSHINE E.DANCE", apiId: "sunshine-eurodance", url: "https://sunsl.streamabc.net/sunsl-eurodance-mp3-192-9832422", logo: "/assets/sunshine-eurodance.png" },
			{ isDefault: true, name: "AirPlay (Lokal)", displayName: "AirPlay", apiId: "airplay", url: "http://10.69.254.100:8090/stream", logo: "https://raw.githubusercontent.com/Bitte-ein-Git/ha_repo/refs/heads/development/airplay_web/icon.png", metaUrl: "http://10.69.254.100:8090/meta", coverUrl: "http://10.69.254.100:8090/cover" }
		];

		let stations = JSON.parse(localStorage.getItem('radio_stations'));
		if (!stations || !stations.find(s => s.apiId === 'airplay') || !stations.find(s => s.apiId === 'sunshine-90s')) {
			stations = defaultStations;
			localStorage.setItem('radio_stations', JSON.stringify(stations));
		}

		let lastPlayedIndex = parseInt(localStorage.getItem('radio_last_index')) || 0;
		let currentStationIndex = -1;
		let metaInterval = null;
		let lastTrackRaw = "";
		let footerOpen = false;
		let mediaRotationInterval = null;
		const audio = document.getElementById('audio-el');

		let isBtActive = localStorage.getItem('radio_bt_mode') === 'true';
		let activeTrackTitle = "";
		let activeTrackArtist = "";
		let activeCoverUrl = "";
		let isTrackInfoPhase = true;

		if ('msAudioCategory' in audio) {
			audio.msAudioCategory = 'BackgroundCapableMedia';
		}

		const dummyAudioSrc = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
		let airplayLastTitle = "";
		let currentCoverUrl = "";

		renderStations();
		handleStartup();

		if ('mediaSession' in navigator) {
			navigator.mediaSession.setActionHandler('play', () => { if (audio.paused) togglePlay(); });
			navigator.mediaSession.setActionHandler('pause', () => { if (!audio.paused) togglePlay(); });
			navigator.mediaSession.setActionHandler('previoustrack', () => skipPrev());
			navigator.mediaSession.setActionHandler('nexttrack', () => skipNext());
			try {
				navigator.mediaSession.setActionHandler('seekbackward', null);
				navigator.mediaSession.setActionHandler('seekforward', null);
			} catch(e) {}
		}

		if (typeof Windows !== 'undefined') {
			try {
				const smtc = Windows.Media.SystemMediaTransportControls.getForCurrentView();
				smtc.isEnabled = true;
				smtc.addEventListener("buttonpressed", (e) => {
					const btn = Windows.Media.SystemMediaTransportControlsButton;
					if (e.button === btn.play || e.button === btn.pause) togglePlay();
					if (e.button === btn.next) skipNext();
					if (e.button === btn.previous) skipPrev();
				});
			} catch(e) {}
		}

		audio.addEventListener('playing', () => { updateStatus("playing"); updatePlayBtn(true); });
		audio.addEventListener('pause', () => {
			updatePlayBtn(false);
			if(!audio.src || audio.src === window.location.href) updateStatus("stopped");

			if (typeof Windows !== 'undefined') {
				try { Windows.Media.SystemMediaTransportControls.getForCurrentView().playbackStatus = Windows.Media.MediaPlaybackStatus.paused; } catch(e) {}
			}
		});

		audio.addEventListener('error', () => {
			if(!audio.src || audio.src === window.location.href || audio.src.startsWith('data:')) return;

			if (currentStationIndex !== -1 && stations[currentStationIndex].apiId === 'airplay') {
				handleAirplayData(stations[currentStationIndex], { isPlaying: false });
				return;
			}
			updateStatus("error"); updatePlayBtn(false);
		});

		function handleStartup() {
			const urlParams = new URLSearchParams(window.location.search);
			let playTarget = urlParams.get('play');
			let btTarget = urlParams.get('bt');
			let action = urlParams.get('action');

			if (action && action.startsWith('web+fordyradio://')) {
				let parts = action.replace('web+fordyradio://', '').split(/[/?]+/);
				if (parts[0] === 'play') playTarget = parts[1];
				if (parts[0] === 'bt') btTarget = parts[1];
			}

			if (btTarget) {
				isBtActive = (btTarget === 'on');
				localStorage.setItem('radio_bt_mode', isBtActive);
			}
			updateBtBtnState();

			let targetIdx = -1;
			if (playTarget) {
				targetIdx = stations.findIndex(s => s.apiId === playTarget);
			} else if (lastPlayedIndex >= 0 && lastPlayedIndex < stations.length) {
				targetIdx = lastPlayedIndex;
			}

			if (targetIdx !== -1 && !stations[targetIdx].isDisabled) {
				playStation(targetIdx);
			} else {
				updateStatus("ready");
			}
		}

		function toggleBluetooth() {
			isBtActive = !isBtActive;
			localStorage.setItem('radio_bt_mode', isBtActive);
			updateBtBtnState();
			if (currentStationIndex !== -1) renderMediaSessionState();
		}

		function updateBtBtnState() {
			const btn = document.getElementById('bt-toggle-btn');
			if (isBtActive) {
				btn.style.color = '#007aff';
				btn.style.textShadow = '0 0 10px rgba(0, 122, 255, 0.8)';
			} else {
				btn.style.color = 'var(--text-color)';
				btn.style.textShadow = 'none';
			}
		}

		function playStation(index) {
			currentStationIndex = index;
			localStorage.setItem('radio_last_index', index);
			const s = stations[index];
			toggleFooter(false);
			updateStatus("loading");
			updatePlayBtn(true);
			hideOverlayLogo();

			lastTrackRaw = "";
			airplayLastTitle = "";
			currentCoverUrl = "";

			document.getElementById('player-title').innerText = s.name;
			document.getElementById('player-artist').innerText = "𝓕𝓸𝓻𝓭𝔂•𝗥𝗮𝗱𝗶𝗼";
			document.getElementById('player-station-name').style.display = 'none';

            // fixed initial path for asset loading
			changeCover(s.logo || '/assets/app.png');
			startMediaSessionRotation(s, null, null, null);

			document.querySelectorAll('.station-item').forEach((el) => {
				const sid = parseInt(el.dataset.index);
				el.classList.toggle('active', sid === index);
			});

			if(metaInterval) clearInterval(metaInterval);

			if (s.apiId === 'airplay') {
				audio.src = dummyAudioSrc;
				audio.loop = true;
				audio.play().then(() => startMetaFetcher(s)).catch(() => { updatePlayBtn(false); updateStatus("ready"); });
			} else {
				audio.loop = false;
				audio.src = s.url;
				audio.play().then(() => startMetaFetcher(s)).catch(() => { updatePlayBtn(false); updateStatus("ready"); });
			}
		}

		function togglePlay() {
			if (currentStationIndex === -1) return;
			if (audio.paused || !audio.src || audio.src === window.location.href) {
				playStation(currentStationIndex);
				if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
			} else {
				audio.pause();
				audio.src = "";
				audio.load();
				updateStatus("stopped");
				updatePlayBtn(false);
				resetToStationView();
				if(metaInterval) clearInterval(metaInterval);
				if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
			}
		}

		function skipNext() {
			if (currentStationIndex === -1) return;
			let next = currentStationIndex;
			let attempts = 0;
			do {
				next = (next + 1) % stations.length;
				attempts++;
			} while (stations[next].isDisabled && attempts < stations.length);
			playStation(next);
		}

		function skipPrev() {
			if (currentStationIndex === -1) return;
			let prev = currentStationIndex;
			let attempts = 0;
			do {
				prev = (prev - 1 + stations.length) % stations.length;
				attempts++;
			} while (stations[prev].isDisabled && attempts < stations.length);
			playStation(prev);
		}

		function toggleMute() {
			audio.muted = !audio.muted;
			document.getElementById('mute-icon').className = audio.muted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
			if (currentStationIndex !== -1) renderMediaSessionState();
		}

		function resetToStationView() {
			if (currentStationIndex === -1) return;
			const s = stations[currentStationIndex];
			document.getElementById('player-title').innerText = s.name;
			document.getElementById('player-artist').innerText = "𝓕𝓸𝓻𝓭𝔂•𝗥𝗮𝗱𝗶𝗼";
			document.getElementById('player-station-name').style.display = 'none';

            // fixed fallback path
			changeCover(s.logo || '/assets/app.png');
			hideOverlayLogo();
			startMediaSessionRotation(s, null, null, null);
		}

		function updateStatus(state) {
			const el = document.getElementById('player-status');
			const map = {
				"ready": "BEREIT",
				"loading": "STREAM WIRD GELADEN…",
				"playing": "WIEDERGABE LÄUFT",
				"stopped": "WIEDERGABE ANGEHALTEN",
				"error": "FEHLER"
			};
			const emojiMap = { "ready": "◽️", "loading": "🔸", "playing": "▶️", "stopped": "⭕️", "error": "⚠️" };

			const text = `${emojiMap[state] || emojiMap.ready} ${map[state] || map.ready}`;
			el.innerText = text;
			document.title = text;
		}

		function updatePlayBtn(isPlaying) {
			document.getElementById('play-icon').className = isPlaying ? 'fa-solid fa-stop' : 'fa-solid fa-play';
		}

		function startMetaFetcher(station) {
			if (metaInterval) clearInterval(metaInterval);
			const fetchInfo = async () => {
				if (audio.paused && !audio.src.startsWith('data:')) return;

				if (station.apiId === 'airplay') {
					try {
						let data;
						if (typeof Windows !== 'undefined' && typeof Windows.Web !== 'undefined' && typeof Windows.Web.Http !== 'undefined') {
							const client = new Windows.Web.Http.HttpClient();
							const uri = new Windows.Foundation.Uri(station.metaUrl + "?t=" + Date.now());
							const resStr = await client.getStringAsync(uri);
							data = JSON.parse(resStr);
						} else {
							const res = await fetch(station.metaUrl);
							if (!res.ok) throw new Error('fail');
							data = await res.json();
						}
						handleAirplayData(station, data);
					} catch(e) {
						handleAirplayData(station, { isPlaying: false });
					}
				} else {
					if (!audio.src || audio.src === window.location.href || audio.src.startsWith('data:')) return;
					fetch('https://api.heyfordy.dev/radio').then(r=>r.json()).then(d => {
						const sd = d[station.apiId];
						handleStationData(station, sd);
					}).catch(() => handleStationData(station, null));
				}
			};
			fetchInfo();
			metaInterval = setInterval(fetchInfo, station.apiId === 'airplay' ? 5000 : 10000);
		}

		async function handleAirplayData(station, data) {
			if (data.isPlaying) {
				if (audio.src.startsWith('data:') || audio.src === window.location.href || audio.paused) {
					audio.loop = false;
					audio.src = station.url;
					try { await audio.play(); } catch(e){}
				}

				const trackTitle = data.title || "Unbekannter Titel";
				const trackArtist = data.artist || "Unbekannter Interpret";

				document.getElementById('player-title').innerText = trackTitle;
				document.getElementById('player-artist').innerText = trackArtist;

				const hideStationName = (trackArtist === station.name || trackArtist === station.displayName);
				document.getElementById('player-station-name').innerText = station.name;
				document.getElementById('player-station-name').style.display = hideStationName ? 'none' : 'block';

				let newCover = currentCoverUrl;
				if (trackTitle !== airplayLastTitle) {
					newCover = station.coverUrl + "?t=" + new Date().getTime();
					airplayLastTitle = trackTitle;
				}

				updateCoverAndSession(newCover, trackTitle, trackArtist, false, station.logo, station);
			} else {
				if (!audio.src.startsWith('data:')) {
					audio.loop = true;
					audio.src = dummyAudioSrc;
					try { await audio.play(); } catch(e){}
				}

				document.getElementById('player-title').innerText = "AirPlay bereit";
				document.getElementById('player-artist').innerText = "Warte auf Stream...";
				document.getElementById('player-station-name').style.display = 'none';

				updateCoverAndSession(station.logo, null, null, false, null, station);
				airplayLastTitle = "";
			}
		}

		async function handleStationData(station, sd) {
			if (audio.paused || !audio.src || !audio.src.includes('://')) return;

			let rawTitle = sd ? (sd.track || "").trim() : "";
			let rawArtist = sd ? (sd.artist || "").trim() : "";
			let apiArt = sd ? (sd.cover || null) : null;

			if (station.apiId === 'rockland') {
				if (apiArt && apiArt.includes('lqv1b91s.png')) apiArt = null;
				if (rawTitle) rawTitle = rawTitle.replace('Rockland Radio - Werbung', 'Werbung').replace('Rockland Radio - Nachrichten', 'Nachrichten');
				if (rawArtist) rawArtist = rawArtist.replace('Rockland Radio - Werbung', 'Werbung').replace('Rockland Radio - Nachrichten', 'Nachrichten');
			}

			const isUnavailable = (rawTitle.toLowerCase().includes("info unavailable") || rawArtist.toLowerCase().includes("info unavailable"));

			if (isUnavailable || (!rawTitle && !rawArtist)) {
				resetToStationView();
				lastTrackRaw = "";
				return;
			}

			let trackTitle = "";
			let trackArtist = "";

			if (rawTitle && rawArtist) {
				trackTitle = rawTitle;
				trackArtist = rawArtist;
			} else if (rawTitle && !rawArtist) {
				trackTitle = rawTitle;
				trackArtist = station.displayName;
			} else if (!rawTitle && rawArtist) {
				trackTitle = rawArtist;
				trackArtist = station.displayName;
			}

			const currentCombo = trackTitle + "|||" + trackArtist;
			if (currentCombo === lastTrackRaw) return;
			lastTrackRaw = currentCombo;

			document.getElementById('player-title').innerText = trackTitle;
			document.getElementById('player-artist').innerText = trackArtist;

			const hideStationName = (trackArtist === station.name || trackArtist === station.displayName);
			document.getElementById('player-station-name').innerText = station.name;
			document.getElementById('player-station-name').style.display = hideStationName ? 'none' : 'block';

			let finalArt = apiArt;
			let showOverlay = !!apiArt;

			if (!finalArt && trackTitle && trackArtist) {
				const lowerTitle = trackTitle.toLowerCase();
				const lowerStation = station.name.toLowerCase();
				const lowerDisplay = station.displayName.toLowerCase();

				if (!lowerTitle.includes(lowerStation) && !lowerTitle.includes(lowerDisplay)) {
					const searchTerm = `${trackArtist} ${trackTitle}`.trim();
					const itunesArt = await fetchItunesCover(searchTerm);
					if (itunesArt) {
						finalArt = itunesArt;
						showOverlay = true;
					}
				}
			}

			if (finalArt) {
				updateCoverAndSession(finalArt, trackTitle, trackArtist, showOverlay, station.logo, station);
			} else {
				updateCoverAndSession(station.logo, trackTitle, trackArtist, false, null, station);
			}
		}

		function updateCoverAndSession(coverUrl, title, sessionArtist, showOverlay, overlayLogoUrl, station) {
            // fixed fallback path
			const finalCover = coverUrl || '/assets/app.png';
			changeCover(finalCover);
			const overlayEl = document.getElementById('player-overlay-logo');
			if (showOverlay && overlayLogoUrl && coverUrl !== overlayLogoUrl) {
				overlayEl.src = overlayLogoUrl;
				overlayEl.style.display = 'block';
				overlayEl.style.transform = 'scale(1.5)';
			} else {
				hideOverlayLogo();
			}
			setTimeout(extractAndApplyColor, 700);
			startMediaSessionRotation(station, title, sessionArtist, finalCover);
		}

		function changeCover(newSrc) {
			if (currentCoverUrl === newSrc) return;
			currentCoverUrl = newSrc;

			const img = document.getElementById('player-img');
			img.style.opacity = 0;
			setTimeout(() => {
				const temp = new Image();
				temp.src = newSrc;
				temp.onload = () => { img.src = newSrc; img.style.opacity = 1; };
                // fixed fallback path
				temp.onerror = () => { img.src = '/assets/app.png'; img.style.opacity = 1; };
			}, 300);
		}

		function hideOverlayLogo() {
			const el = document.getElementById('player-overlay-logo');
			el.style.display = 'none';
			el.style.transform = 'scale(1)';
		}

		function extractAndApplyColor() {
			const img = document.getElementById('player-img');
			const canvas = document.getElementById('color-canvas');
			const ctx = canvas.getContext('2d');
			try {
				canvas.width = 10; canvas.height = 10;
				ctx.drawImage(img, 0, 0, 10, 10);
				const p = ctx.getImageData(5, 5, 1, 1).data;
				document.documentElement.style.setProperty('--glow-color', `rgba(${p[0]}, ${p[1]}, ${p[2]}, 0.5)`);
			} catch(e) {
				document.documentElement.style.setProperty('--glow-color', `rgba(255, 100, 0, 0.4)`);
			}
		}

		async function fetchItunesCover(term) {
			try {
				const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=song&limit=1`);
				const data = await res.json();
				if(data.resultCount>0) return data.results[0].artworkUrl100.replace('100x100bb','600x600bb');
			} catch(e){}
			return null;
		}

		function startMediaSessionRotation(station, trackTitle, trackArtist, coverUrl) {
			activeTrackTitle = trackTitle || "";
			activeTrackArtist = trackArtist || "";
            // fixed fallback path
			activeCoverUrl = coverUrl || station.logo || '/assets/app.png';

			if (mediaRotationInterval) clearInterval(mediaRotationInterval);
			isTrackInfoPhase = true;

			renderMediaSessionState();
			mediaRotationInterval = setInterval(() => {
				isTrackInfoPhase = !isTrackInfoPhase;
				renderMediaSessionState();
			}, 5000);
		}

		function renderMediaSessionState() {
			if (currentStationIndex === -1) return;
			const station = stations[currentStationIndex];
			let t = "", a = "", al = "", c = "";

			const dispTitle = activeTrackTitle ? activeTrackTitle : station.displayName;
			const dispArtist = activeTrackTitle ? activeTrackArtist : "Fordy-FM";
			const dispCover = activeCoverUrl;
            // fixed fallback path
			const logoCover = station.logo || '/assets/app.png';

			if (audio.muted) {
				t = "Stummgeschaltet";
				a = station.displayName;
				c = logoCover;
				al = "heyFordy.dev Radio";
			} else if (isBtActive) {
				t = dispTitle;
				a = dispArtist;
				c = isTrackInfoPhase ? dispCover : logoCover;
				al = isTrackInfoPhase ? "heyFordy.dev Radio" : station.displayName;
			} else {
				if (isTrackInfoPhase) {
					t = dispTitle;
					a = dispArtist;
					c = dispCover;
				} else {
					t = station.displayName;
					a = "Fordy-FM";
					c = logoCover;
				}
				al = "heyFordy.dev Radio";
			}

			updateMediaSessionNative(t, a, al, c);
		}

		function updateMediaSessionNative(t, a, al, i) {
			if('mediaSession' in navigator) {
				navigator.mediaSession.metadata = new MediaMetadata({
					title: t,
					artist: a,
					album: al,
					duration: Infinity,
					startTime: 0,
                    // fixed fallback path
					artwork: [{ src: i || '/assets/app.png', sizes: '512x512', type: 'image/png' }]
				});
				navigator.mediaSession.playbackState = "playing";

				navigator.mediaSession.setActionHandler('previoustrack', () => skipPrev());
				navigator.mediaSession.setActionHandler('nexttrack', () => skipNext());

				try {
					navigator.mediaSession.setActionHandler('seekbackward', null);
					navigator.mediaSession.setActionHandler('seekforward', null);
				} catch(e) {}
			}

			if (typeof Windows !== 'undefined') {
				(async () => {
					try {
						const smtc = Windows.Media.SystemMediaTransportControls.getForCurrentView();
						smtc.isPlayEnabled = true; smtc.isPauseEnabled = true; smtc.isNextEnabled = true; smtc.isPreviousEnabled = true;
						const updater = smtc.displayUpdater;
						updater.type = Windows.Media.MediaPlaybackType.music;
						updater.musicProperties.title = t;
						updater.musicProperties.artist = a;
						updater.musicProperties.albumTitle = al;

						if (i) {
							const absUrl = new URL(i, document.baseURI).href;
							if (absUrl.startsWith('http://')) {
								const folder = Windows.Storage.ApplicationData.current.localCacheFolder;
								const file = await folder.createFileAsync("smtc_cover.jpg", Windows.Storage.CreationCollisionOption.replaceExisting);
								const client = new Windows.Web.Http.HttpClient();
								const buffer = await client.getBufferAsync(new Windows.Foundation.Uri(absUrl));
								await Windows.Storage.FileIO.writeBufferAsync(file, buffer);
								updater.thumbnail = Windows.Storage.Streams.RandomAccessStreamReference.createFromFile(file);
							} else {
								updater.thumbnail = Windows.Storage.Streams.RandomAccessStreamReference.createFromUri(new Windows.Foundation.Uri(absUrl));
							}
						}

						updater.update();
						smtc.playbackStatus = Windows.Media.MediaPlaybackStatus.playing;
					} catch(e) {}
				})();
			}
		}

		function toggleFooter(force) {
			footerOpen = (force !== undefined) ? force : !footerOpen;
			const footer = document.getElementById('main-footer');
			footer.classList.toggle('expanded', footerOpen);
			document.getElementById('footer-arrow').innerText = footerOpen ? '▼' : '▲';
		}

		function openManager() { renderManagerList(); document.getElementById('manager-modal').style.display = 'flex'; }
		function closeManager() { document.getElementById('manager-modal').style.display = 'none'; }

		function renderStations() {
			const list = document.getElementById('footer-list');
			const sideList = document.getElementById('sidebar-list');
			list.innerHTML = '';
			sideList.innerHTML = '';

			stations.forEach((s, i) => {
				if (s.isDisabled) return;
                // fixed fallback path
				const html = `<div class="station-item ${i === currentStationIndex ? 'active' : ''}" data-index="${i}" onclick="playStation(${i})">
					<img src="${s.logo || '/assets/app.png'}" class="station-logo" onerror="this.src='/assets/app.png'">
					<div class="station-info"><span>${s.name}</span></div>
					<i class="fa-solid fa-play" style="opacity:0.2; font-size: 0.8rem;"></i>
				</div>`;
				list.innerHTML += html;
				sideList.innerHTML += html;
			});
		}

		function renderManagerList() {
			const list = document.getElementById('settings-list');
			list.innerHTML = '';
			stations.forEach((s, i) => {
				list.innerHTML += `<div class="switch-container">
					<div style="flex:1; opacity: ${s.isDisabled ? 0.4 : 1};"><strong>${s.name}</strong></div>
					<div style="display:flex; gap: 12px; align-items:center;">
						<i class="fa-solid fa-chevron-up" onclick="moveStation(${i},-1)" style="cursor:pointer; opacity:0.5;"></i>
						<i class="fa-solid fa-chevron-down" onclick="moveStation(${i},1)" style="cursor:pointer; opacity:0.5;"></i>
						${!s.isDefault ? `<i class="fa-solid fa-trash-can" onclick="removeStation(${i})" style="color:#ff4444; cursor:pointer;"></i>` : `<i class="fa-solid ${s.isDisabled ? 'fa-eye-slash' : 'fa-eye'}" onclick="toggleStation(${i})" style="cursor:pointer; opacity:0.5;"></i>`}
					</div>
				</div>`;
			});
		}

		function toggleStation(idx) {
			stations[idx].isDisabled = !stations[idx].isDisabled;
			saveAndRefresh();
		}

		function moveStation(idx, dir) {
			let nIdx = idx + dir;
			if (nIdx < 0 || nIdx >= stations.length) return;
			[stations[idx], stations[nIdx]] = [stations[nIdx], stations[idx]];
			saveAndRefresh();
		}

		function removeStation(idx) { stations.splice(idx, 1); saveAndRefresh(); }

		function addStationManual() {
			const n = document.getElementById('new-name').value;
			const u = document.getElementById('new-url').value;
			if(n && u) {
				stations.push({
					name: n,
					displayName: n,
					url: u,
					logo: document.getElementById('new-logo').value
				});
				saveAndRefresh();
				document.getElementById('new-name').value = '';
				document.getElementById('new-url').value = '';
				document.getElementById('new-logo').value = '';
			}
		}

		function saveAndRefresh() { localStorage.setItem('radio_stations', JSON.stringify(stations)); renderStations(); renderManagerList(); }
		function clearCache() { localStorage.clear(); window.location.reload(true); }

		window.onclick = (e) => { if (e.target.className === 'modal') { closeManager(); } }

        // pwa sw registration
        if ('serviceWorker' in navigator) {
          window.onload = () => {
            navigator.serviceWorker.register('/sw.js');
          }
        }
	</script>
</body>
</html>
