name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: chmod +x node_modules/.bin/cap

      - run: rm -rf ios
      
      - run: npx cap add ios
      - run: npx cap sync ios

      # use .xcodeproj instead of .xcworkspace for newer capacitor versions
      - name: Build Xcode Archive
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            clean archive \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r FordyRadio.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: IPA
          path: FordyRadio.ipa